  <div class="cards" id="cards">
<script>
async function loadGallery() {

  const container = document.getElementById("cards");

  const folders = await fetch("assets/artworks/index.json")
    .then(r => r.json());

  for (const folder of folders) {

    const base = `assets/artworks/${folder}`;

    const title = await fetch(`${base}/title.txt`).then(r => r.text());
    const desc  = await fetch(`${base}/desc.txt`).then(r => r.text());
    const date  = await fetch(`${base}/date.txt`).then(r => r.text());

    const img = `${base}/img.png`;

    const card = document.createElement("div");
    card.className = "card";

    card.innerHTML = `
      <img src="${img}">
      <div class="container">
        <h4><b>${title}</b></h4>
        <p>${desc}</p>
        <small>${date}</small>
      </div>
    `;

    container.appendChild(card);
  }
}

loadGallery();
</script>
