<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Eden Nisam | Sculptor & Painter</title>
  <meta name="description" content="Portfolio of Eden Nisam, sculptor and painter exploring organic forms and textures. View artworks and sculptures online.">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <header class="header">
    <a href="#default" class="logo">EDEN NISAM</a>
    <nav class="header-right">
      <a href="index.html">ABOUT</a>
      <a href="paintings.html">PAINTINGS</a>
      <a class="active" href="sculptures.html">SCULPTURES</a>
      <a href="exhibitions.html">EXHIBITIONS</a>
    </nav>
  </header>

  <main>
    <section class="cards" id="cards">
      <script>
        async function loadGallery() {
          const container = document.getElementById("cards");
          const folders = await fetch("assets/sculptures/index.json").then(r => r.json());

          for (const folder of folders) {
            const base = `assets/sculptures/${folder}`;
            const title = await fetch(`${base}/title.txt`).then(r => r.text());
            const desc  = await fetch(`${base}/desc.txt`).then(r => r.text());
            const date  = await fetch(`${base}/date.txt`).then(r => r.text());
            const img = `${base}/img.png`;

            const card = document.createElement("div");
            card.className = "card";

            card.innerHTML = `
              <img src="${img}" alt="${title}">
              <div class="container">
                <h4><b>${title}</b></h4>
                <p>${desc}</p>
                <small>${date}</small>
              </div>
            `;

            container.appendChild(card);
          }
        }

        loadGallery();
      </script>
    </section>
  </main>

  <footer class="footer">
    <a href="mailto:ENISAM@depaul.edu?subject=Hello">EMAIL</a>
    <a href="https://instagram.com/eden_does/">INSTAGRAM</a>
  </footer>

</body>
</html>
